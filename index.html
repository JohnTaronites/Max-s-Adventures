<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max's Adventures</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="ui-container">
        <div id="stats-panel">
            <div class="stat-box">
                <span class="label">LVL</span>
                <span id="level-val" class="value">1</span>
            </div>
            <div class="stat-box" style="margin-left: 10px;">
                <span class="label">WYNIK</span>
                <span id="score-val" class="value">0</span>
            </div>
        </div>

        <div id="lives-panel">
            <span class="label">ŻYCIA</span>
            <div id="hearts">❤❤❤</div>
        </div>

        <div id="legend-panel">
            <div class="legend-item danger-item">
                <span class="legend-icon">🛢</span>
                <span class="legend-text">UNIKAJ</span>
            </div>
            <div class="legend-item collect-item">
                <span class="legend-icon">🪙</span>
                <span class="legend-text">ZBIERAJ</span>
            </div>
        </div>

        <div id="controls-hint">
            PC: Strzałki / A&ndash;D &nbsp;|&nbsp; Mobile: Przesuń palcem
        </div>

        <div id="game-over">
            <h1>KONIEC GRY</h1>
            <p>Twój wynik: <span id="final-score">0</span></p>
            <button onclick="location.reload()">Zagraj ponownie</button>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script type="module" src="game.js"></script>
</body>
</html>
