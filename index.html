<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max's Adventures</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="ui-container">
        <div id="stats-panel">
            <div class="stat-box">
                <span class="label">LVL</span>
                <span id="level-val" class="value">1</span>
            </div>
            <div class="stat-box" style="margin-left: 10px;">
                <span class="label">WYNIK</span>
                <span id="score-val" class="value">0</span>
            </div>
        </div>

        <div id="lives-panel">
            <span class="label">&#x17B;YCIA</span>
            <div id="hearts">&#x2764;&#x2764;&#x2764;</div>
        </div>

        <div id="legend-panel">
            <div class="legend-item danger-item">
                <span class="legend-icon">
                    <svg width="22" height="22" viewBox="0 0 22 22" xmlns="http://www.w3.org/2000/svg">
                        <rect x="4" y="5" width="14" height="13" rx="2" fill="#cc2200"/>
                        <rect x="4" y="5" width="14" height="3" rx="1" fill="#ff4422"/>
                        <rect x="4" y="14" width="14" height="2" fill="#aa1100"/>
                        <rect x="4" y="9" width="14" height="1.5" fill="#ff6644" opacity="0.5"/>
                        <ellipse cx="11" cy="5" rx="7" ry="2" fill="#ff4422"/>
                        <ellipse cx="11" cy="18" rx="7" ry="2" fill="#aa1100"/>
                        <rect x="9" y="3" width="4" height="2.5" rx="1" fill="#888"/>
                    </svg>
                </span>
                <span class="legend-text">UNIKAJ</span>
            </div>
            <div class="legend-item collect-item">
                <span class="legend-icon">
                    <svg width="22" height="22" viewBox="0 0 22 22" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="11" cy="11" r="9" fill="#f0a500"/>
                        <circle cx="11" cy="11" r="7" fill="#ffd700"/>
                        <circle cx="11" cy="11" r="5" fill="#f0a500"/>
                        <text x="11" y="15" text-anchor="middle" font-size="7" font-weight="bold" fill="#fff8cc" font-family="Arial,sans-serif">$</text>
                    </svg>
                </span>
                <span class="legend-text">ZBIERAJ</span>
            </div>
        </div>

        <div id="controls-hint">
            PC: Strza&#322;ki / A&ndash;D &nbsp;|&nbsp; Mobile: Swipe lewo/prawo
        </div>

        <div id="game-over">
            <h1>KONIEC GRY</h1>
            <p>Twój wynik: <span id="final-score">0</span></p>
            <button onclick="location.reload()">Zagraj ponownie</button>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script type="module" src="game.js"></script>
</body>
</html>
