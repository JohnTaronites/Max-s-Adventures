<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max's Adventures</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- START SCREEN -->
    <div id="start-screen">
        <h1>MAX'S<br>ADVENTURES</h1>
        <p class="start-sub">Omijaj ma&#322;pki, zbieraj oreo!</p>
        <button id="start-btn" onclick="startGame()">&#9654; START GRY</button>
        <p class="start-hint">PC: Strza&#322;ki / A&ndash;D &nbsp;|&nbsp; Mobile: Przyciski lub Swipe</p>
    </div>

    <div id="ui-container">
        <!-- TOP UI: stats row + (pause + lives) row -->
        <div id="top-ui">
            <div id="stats-panel">
                <div class="stat-box">
                    <span class="label">LVL</span>
                    <span id="level-val" class="value">1</span>
                </div>
                <div class="stat-box">
                    <span class="label">WYNIK</span>
                    <span id="score-val" class="value">0</span>
                </div>
                <div class="stat-box">
                    <span class="label">OREO</span>
                    <span id="oreo-val" class="value oreo-value">&#x1F36A; 0</span>
                </div>
            </div>
            <div id="lives-row">
                <!-- PAUSE BUTTON -->
                <button id="pause-btn" onclick="togglePause()">&#9646;&#9646;</button>
                <div id="lives-panel">
                    <span class="label">&#x17B;YCIA</span>
                    <div id="hearts">&#x2764;&#x2764;&#x2764;&#x2764;&#x2764;</div>
                </div>
            </div>
        </div>

        <!-- LEGENDA (desktop) / PRZYCISKI (mobile) -->
        <div id="legend-panel">
            <div class="legend-item danger-item">
                <span class="legend-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="9" fill="#8B4513"/>
                        <circle cx="3" cy="12" r="3.5" fill="#8B4513"/>
                        <circle cx="3" cy="12" r="2" fill="#ff9999"/>
                        <circle cx="21" cy="12" r="3.5" fill="#8B4513"/>
                        <circle cx="21" cy="12" r="2" fill="#ff9999"/>
                        <ellipse cx="12" cy="15" rx="5" ry="3.5" fill="#D2934A"/>
                        <circle cx="9" cy="10" r="2" fill="white"/>
                        <circle cx="15" cy="10" r="2" fill="white"/>
                        <circle cx="9.5" cy="10.5" r="1.1" fill="#1a0a00"/>
                        <circle cx="15.5" cy="10.5" r="1.1" fill="#1a0a00"/>
                        <circle cx="10.5" cy="14.5" r="0.9" fill="#6b3010"/>
                        <circle cx="13.5" cy="14.5" r="0.9" fill="#6b3010"/>
                        <line x1="7.5" y1="8" x2="10.5" y2="7" stroke="#3a1a00" stroke-width="1" stroke-linecap="round"/>
                        <line x1="16.5" y1="8" x2="13.5" y2="7" stroke="#3a1a00" stroke-width="1" stroke-linecap="round"/>
                    </svg>
                </span>
                <span class="legend-text">UNIKAJ</span>
            </div>
            <div class="legend-item collect-item">
                <span class="legend-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <ellipse cx="12" cy="16" rx="9" ry="3" fill="#1a0f05"/>
                        <ellipse cx="12" cy="13" rx="8.5" ry="2.5" fill="#f5f0e8"/>
                        <ellipse cx="12" cy="10" rx="9" ry="3" fill="#1a0f05"/>
                        <ellipse cx="12" cy="9" rx="5.5" ry="1.8" fill="none" stroke="#3d2010" stroke-width="0.8"/>
                        <circle cx="12" cy="7.5" r="0.7" fill="#3d2010"/>
                        <circle cx="14.5" cy="8.2" r="0.7" fill="#3d2010"/>
                        <circle cx="9.5" cy="8.2" r="0.7" fill="#3d2010"/>
                        <circle cx="15.8" cy="10" r="0.7" fill="#3d2010"/>
                        <circle cx="8.2" cy="10" r="0.7" fill="#3d2010"/>
                    </svg>
                </span>
                <span class="legend-text">ZBIERAJ</span>
            </div>
            <div class="legend-item banana-item">
                <span class="legend-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <!-- Banana -->
                        <path d="M7 18 Q6 10 13 6 Q18 4 19 7 Q17 5 13 8 Q8 12 9 18 Z" fill="#FFE135" stroke="#C8A000" stroke-width="0.5"/>
                        <circle cx="7.5" cy="17.5" r="1" fill="#C8A000"/>
                        <rect x="12" y="4" width="2" height="3" rx="1" fill="#5a3a00" transform="rotate(-20 13 5)"/>
                        <text x="12" y="23" text-anchor="middle" font-size="7" fill="white" font-family="Arial" font-weight="bold">+&#x2764;</text>
                    </svg>
                </span>
                <span class="legend-text">&#x2764; +1</span>
            </div>
        </div>

        <!-- MOBILE ARROW BUTTONS -->
        <div id="mobile-controls">
            <button class="dir-btn" id="btn-left" ontouchstart="mobileTap(-1)" onmousedown="mobileTap(-1)">&#9664;</button>
            <button class="dir-btn" id="btn-right" ontouchstart="mobileTap(1)" onmousedown="mobileTap(1)">&#9654;</button>
        </div>

        <div id="controls-hint">
            PC: Strza&#322;ki / A&ndash;D &nbsp;|&nbsp; Mobile: Swipe lewo/prawo
        </div>

        <!-- PAUSE OVERLAY -->
        <div id="pause-overlay">
            <div id="pause-box">
                <h2>PAUZA</h2>
                <button onclick="togglePause()">&#9654; Wznów</button>
            </div>
        </div>

        <div id="game-over">
            <h1>KONIEC GRY</h1>
            <p>Twój wynik: <span id="final-score">0</span></p>
            <p style="font-size:15px; color:#aaa;">Oreo zjedzone: <span id="final-oreo">0</span></p>
            <button onclick="location.reload()">Zagraj ponownie</button>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script type="module" src="game.js"></script>
</body>
</html>
